# ──────────────────────────────────────────────────────────────────────────────
# CadenceWorks — Twilio WhatsApp Configuration
# ──────────────────────────────────────────────────────────────────────────────
#
# SETUP INSTRUCTIONS (5 minutes):
#
# 1. Go to https://www.twilio.com and create a free account
# 2. From your Twilio Console dashboard, copy:
#    - Account SID  (starts with AC...)
#    - Auth Token   (click to reveal)
# 3. In the Twilio Console, go to:
#    Messaging → Try it out → Send a WhatsApp message
#    Follow the sandbox setup — you'll get a WhatsApp sandbox number
# 4. Paste your credentials below and save this file
# 5. The Reminder Agent is now live
#
# COSTS:
#   Twilio trial account:  FREE (includes R200 credit)
#   Per WhatsApp message:  ~R0.50–R1.50
#   Typical practice/month: ~R400 (built into your subscription pricing)
#
# ──────────────────────────────────────────────────────────────────────────────

[twilio]
account_sid = YOUR_ACCOUNT_SID_HERE
auth_token  = YOUR_AUTH_TOKEN_HERE

# Your Twilio WhatsApp sandbox number (format: whatsapp:+14155238886)
# In production this becomes your dedicated WhatsApp Business number
from_number = whatsapp:+14155238886

# ──────────────────────────────────────────────────────────────────────────────
# Practice Settings
# ──────────────────────────────────────────────────────────────────────────────

[practice]
name         = My Medical Practice
currency     = R

# Country code for patient numbers (South Africa = +27)
# The engine will prepend this if the number doesn't start with +
country_code = +27

# ──────────────────────────────────────────────────────────────────────────────
# Reminder Agent Settings
# ──────────────────────────────────────────────────────────────────────────────

[reminder_agent]

# Risk score threshold to trigger reminder sequence (0-100)
# Bookings scoring above this get the full 3-message sequence
high_risk_threshold = 70

# Medium risk gets a single 24hr reminder
medium_risk_threshold = 45

# Reminder timing (hours before appointment)
# High risk: 3 reminders
high_risk_schedule  = 72, 24, 4

# Medium risk: 1 reminder
medium_risk_schedule = 24

# How often the agent checks for upcoming reminders (minutes)
poll_interval_minutes = 15

# ──────────────────────────────────────────────────────────────────────────────
# Message Templates
# ──────────────────────────────────────────────────────────────────────────────
# Available placeholders:
#   {practice_name}    - from [practice] above
#   {patient_name}     - patient's name
#   {provider}         - e.g. Dr Naidoo
#   {appt_date}        - e.g. Monday 4 March
#   {appt_time}        - e.g. 08:30
#   {appt_type}        - e.g. Consultation
#   {hours_until}      - hours until appointment
#   {cancel_number}    - number to call/WhatsApp to cancel

[templates]
cancel_number = 0800 123 456

reminder_72hr =
    Hi {patient_name} 👋
    
    This is a reminder from {practice_name}.
    
    You have a *{appt_type}* with *{provider}* in 3 days:
    📅 {appt_date} at {appt_time}
    
    Please reply *CONFIRM* to confirm or *CANCEL* to cancel.
    To reschedule, call us on {cancel_number}.

reminder_24hr =
    Hi {patient_name} 👋
    
    Reminder from {practice_name} — your appointment is *tomorrow*:
    📅 {appt_date} at {appt_time} with {provider}
    
    Reply *CONFIRM* to confirm or *CANCEL* if you can't make it.
    We have patients on our waiting list who would love your slot! 🙏

reminder_4hr =
    Hi {patient_name} — see you *today* at {appt_time} with {provider}!
    
    📍 {practice_name}
    
    If you can't make it, please let us know ASAP on {cancel_number} so we can give your slot to someone waiting.

confirmed_reply =
    ✅ Great, we'll see you at {appt_time} on {appt_date}!
    
    — {practice_name}

cancelled_reply =
    No problem {patient_name}, your appointment has been cancelled.
    
    To rebook, WhatsApp or call us on {cancel_number}.
    
    — {practice_name}
